name: CI Simples

on: [push] # Roda sempre que você enviar código

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar requirements.txt
      run: |
        pip install -r requirements.txt